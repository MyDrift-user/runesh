name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
tag-prefix: 'v'
template: |
  ## RUNESH v$RESOLVED_VERSION

  Single release for the whole repo: `runesh-cli` binaries + `@mydrift/runesh-ui` npm package.

  Install or update the CLI:

  ```sh
  # macOS / Linux
  curl -fsSL https://raw.githubusercontent.com/MyDrift-user/runesh/main/install.sh | bash

  # Windows (PowerShell)
  irm https://raw.githubusercontent.com/MyDrift-user/runesh/main/install.ps1 | iex

  # Already installed
  runesh update
  ```

  Use the UI package:

  ```json
  "@mydrift/runesh-ui": "^$RESOLVED_VERSION"
  ```

  $CHANGES
categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: 'Security'
    labels:
      - 'security'
  - title: 'Breaking Changes'
    labels:
      - 'breaking'
  - title: 'CI / Chores'
    labels:
      - 'chore'
      - 'ci'
      - 'docs'
exclude-labels:
  - 'skip-changelog'
version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bug'
      - 'security'
  default: patch
