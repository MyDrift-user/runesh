name-template: 'ui-v$RESOLVED_VERSION'
tag-template: 'ui-v$RESOLVED_VERSION'
template: |
  ## @mydrift-user/runesh-ui v$RESOLVED_VERSION

  $CHANGES
categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: 'Security'
    labels:
      - 'security'
  - title: 'Breaking Changes'
    labels:
      - 'breaking'
version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bug'
      - 'security'
  default: patch
