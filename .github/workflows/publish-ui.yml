name: Publish @mydrift-user/runesh-ui

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'ui-v')
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Set version from release tag
        working-directory: packages/ui
        run: |
          VERSION="${GITHUB_REF_NAME#ui-v}"
          bun run npm pkg set version="$VERSION"

      - name: Setup .npmrc for GitHub Packages
        run: |
          echo "@mydrift-user:registry=https://npm.pkg.github.com" >> packages/ui/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> packages/ui/.npmrc

      - name: Install dependencies
        working-directory: packages/ui
        run: bun install --no-save

      - name: Publish to GitHub Packages
        working-directory: packages/ui
        run: bun publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
