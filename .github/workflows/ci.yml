name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Required: the CLI is what we ship via release.yml. It must always build & test on all platforms.
  cli:
    name: runesh-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.os }}
      - run: cargo build --locked -p runesh-cli
      - run: cargo test  --locked -p runesh-cli

  # Full workspace check on all platforms. Crates use #[cfg(target_os)] so each
  # OS exercises different platform code (cfapi on Windows, FUSE on Linux, etc.).
  workspace:
    name: workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev \
            libfuse3-dev \
            libx11-dev libxtst-dev libxrandr-dev libxi-dev libxdo-dev
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install macfuse
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-${{ matrix.os }}
      - run: cargo check --workspace --locked
      - run: cargo test --workspace --locked --no-fail-fast

  # Required: @mydrift/runesh-ui must typecheck, build, and pass dry-run publish.
  ui:
    name: "@mydrift/runesh-ui"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - run: npm publish --dry-run --access public

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev \
            libfuse3-dev \
            libx11-dev libxtst-dev libxrandr-dev libxi-dev libxdo-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint-ubuntu
      - run: cargo fmt --all -- --check
      # Clippy runs workspace-wide and fails the job on its own lints. The
      # `-D warnings` gate is intentionally deferred: old crates still carry
      # advisory warnings until the incremental hardening PRs land. Flip to
      # `-D warnings` once the hardening series is fully merged.
      - run: cargo clippy --workspace --all-targets

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit-ubuntu
      - run: cargo install cargo-audit --locked
      # Vulnerabilities fail the job; unmaintained/unsound advisories are
      # reported but do not block until the incremental hardening PRs land.
      - run: cargo audit
