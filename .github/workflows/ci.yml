name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Required: the CLI is what we ship via release.yml. It must always build & test on all platforms.
  cli:
    name: runesh-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.os }}
      - run: cargo build --locked -p runesh-cli
      - run: cargo test  --locked -p runesh-cli

  # Full workspace check on all platforms. Crates use #[cfg(target_os)] so each
  # OS exercises different platform code (cfapi on Windows, FUSE on Linux, etc.).
  workspace:
    name: workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev \
            libfuse3-dev \
            libx11-dev libxtst-dev libxrandr-dev libxi-dev libxdo-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-${{ matrix.os }}
      - run: cargo check --workspace

  # Required: @mydrift/runesh-ui must typecheck, build, and pass dry-run publish.
  ui:
    name: "@mydrift/runesh-ui"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - run: npm publish --dry-run --access public

  # Advisory: lints. Will be enforced once the codebase is clean.
  lint:
    name: fmt + clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p runesh-cli -- -D warnings
