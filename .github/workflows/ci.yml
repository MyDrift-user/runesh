name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Required: the CLI is what we ship via release.yml. It must always build & test on all platforms.
  cli:
    name: runesh-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.os }}
      - run: cargo build --locked -p runesh-cli
      - run: cargo test  --locked -p runesh-cli

  # Advisory: full workspace check on Linux. Some crates (vfs, tauri, desktop) have heavy
  # system deps and platform gating still being sorted out — failures here don't block merges.
  workspace:
    name: workspace check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev \
            libfuse3-dev \
            libx11-dev libxtst-dev libxrandr-dev libxi-dev libxdo-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  # Advisory: lints. Will be enforced once the codebase is clean.
  lint:
    name: fmt + clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p runesh-cli -- -D warnings
