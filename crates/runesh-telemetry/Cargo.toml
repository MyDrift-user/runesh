[package]
name = "runesh-telemetry"
version.workspace = true
edition.workspace = true
description = "Sentry/GlitchTip error reporting + tracing integration for RUNESH services"
license = "MIT OR Apache-2.0"
repository = "https://github.com/MyDrift-user/runesh"

[features]
default = ["tracing-layer"]
# Forward `tracing` events at WARN/ERROR level to Sentry as breadcrumbs/events.
tracing-layer = ["dep:sentry-tracing", "dep:tracing-subscriber"]
# Tower/Axum middleware that captures request context on each request.
axum = ["dep:sentry-tower", "dep:tower", "dep:http"]

[dependencies]
sentry = { version = "0.47", default-features = false, features = [
    "backtrace",
    "contexts",
    "panic",
    "reqwest",
    "rustls",
] }
sentry-tracing  = { version = "0.47", optional = true }
sentry-tower    = { version = "0.47", optional = true, features = ["http"] }
tracing         = { workspace = true }
tracing-subscriber = { version = "0.3", optional = true, default-features = false, features = ["registry"] }
tower           = { version = "0.5", optional = true }
http            = { version = "1", optional = true }
