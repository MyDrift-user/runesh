[package]
name = "runesh-remote"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Remote file explorer and CLI over WebSocket with enterprise security"

[features]
default = ["axum", "cli", "fs"]
axum = ["dep:axum", "dep:futures-util"]
cli = ["dep:portable-pty"]
fs = []
watch = ["dep:notify"]
# Exposes `InsecureAllowAllAuth`. Never enable this on a shipped binary.
insecure-test-auth = []

[dependencies]
tokio = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
bytes = { workspace = true }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
sha2 = { workspace = true }
hex = "0.4"
base64 = { version = "0.22", features = ["std"] }
walkdir = "2"
zip = "8"

# Optional: Axum WebSocket handlers
axum = { version = "0.8", features = ["ws"], optional = true }
futures-util = { version = "0.3", optional = true }

# Optional: PTY for remote CLI
portable-pty = { version = "0.9", optional = true }

# Optional: File system watching
notify = { version = "8", optional = true }

[target.'cfg(windows)'.dependencies]
# Used by `cli::pty_as_user` to spawn a PTY-wrapped process inside a
# target user's session via ConPTY + CreateProcessAsUserW. Only pulled
# in on Windows.
windows = { version = "0.62", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_Com",
    "Win32_System_Console",
    "Win32_System_Environment",
    "Win32_System_IO",
    "Win32_System_Pipes",
    "Win32_System_RemoteDesktop",
    "Win32_System_Threading",
    "Win32_System_Memory",
] }
