[package]
name = "runesh-relay"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "DERP relay server for forwarding encrypted WireGuard packets between mesh peers that cannot connect directly"

[features]
default = []
# Expose RelayServer::run_tls(TlsAcceptor). Adds tokio-rustls as a dep.
tls = ["dep:tokio-rustls"]

[dependencies]
tokio = { workspace = true, features = ["net", "io-util", "sync", "macros", "rt-multi-thread", "time"] }
tracing = { workspace = true }
thiserror = { workspace = true }

bytes = { workspace = true }
base64 = "0.22"
dashmap = "6"
rand = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
secrecy = { workspace = true }
subtle = { workspace = true }
tokio-rustls = { version = "0.26", optional = true, default-features = false, features = ["ring"] }
