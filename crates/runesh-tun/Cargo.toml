[package]
name = "runesh-tun"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Cross-platform TUN device abstraction for virtual networking"

[dependencies]
tokio = { workspace = true }
tracing = { workspace = true }
bytes = { workspace = true }
thiserror = { workspace = true }

[features]
default = []
# Dev-only escape hatch. When enabled, skip the pinned SHA-256 check on
# wintun.dll, or allow loading with no pin configured at build time.
# Logs a loud warning at startup. Never enable on a shipped binary.
#
# The production path requires the RUNESH_WINTUN_SHA256_HEX env var to be
# set at `cargo build` time to the hex-encoded SHA-256 of the exact
# wintun.dll bundled alongside the consumer executable.
unpinned-wintun = []

[target.'cfg(windows)'.dependencies]
wintun = "0.5"
sha2 = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
